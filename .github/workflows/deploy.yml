name: Deploy Final Image

# Rebuilds and pushes the final image (Dockerfile) whenever scripts or
# entrypoint logic changes on main — without waiting for a new openclaw release.
# Uses the latest available base image (pre-compiled openclaw binary from
# the auto-update workflow) so this build takes ~1 minute instead of ~20.

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - scripts/**

env:
  GITHUB_REGISTRY: ghcr.io
  IMAGE_NAME: u2giants/openclaw
  BASE_IMAGE_NAME: u2giants/openclaw-base

jobs:
  build-final:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ${{ env.GITHUB_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push final image (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            BASE_IMAGE=${{ env.GITHUB_REGISTRY }}/${{ env.BASE_IMAGE_NAME }}:latest
          tags: |
            ${{ env.GITHUB_REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}
          cache-from: type=gha,scope=final-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=final-${{ matrix.arch }}

  merge-manifest:
    runs-on: ubuntu-latest
    needs: build-final
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Login to ${{ env.GITHUB_REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish :latest multi-arch manifest
        run: |
          IMAGE="${{ env.GITHUB_REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"
          echo "Published ${IMAGE}:latest"

      - name: Trigger Coolify redeploy
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        if: env.COOLIFY_WEBHOOK != ''
        run: |
          curl -fsSL --max-time 30 "$COOLIFY_WEBHOOK"
          echo "Coolify deploy triggered"
